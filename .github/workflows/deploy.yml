name: Deploy to Cloudflare

on:
  push:
    branches: [main]        # Decap CMS 保存即 commit main,自动触发 = 无感发布
  workflow_dispatch:        # 手动重跑开关

# 同一时间只跑一条部署,避免并发覆盖
concurrency:
  group: workers-deploy
  cancel-in-progress: true

jobs:
  deploy-proxy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'proxy/package-lock.json'

      - run: cd proxy && npm ci

      - name: Deploy OAuth Proxy
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: proxy
          command: deploy

  deploy-site:
    needs: deploy-proxy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Build (Astro + Cloudflare adapter)
        env:
          PUBLIC_TURNSTILE_SITE_KEY: ${{ secrets.PUBLIC_TURNSTILE_SITE_KEY }}
        run: npm run build

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --compatibility-flag nodejs_compat
