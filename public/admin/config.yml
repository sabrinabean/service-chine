# Decap CMS configuration for Service Chine
# Documentation: https://decapcms.org/docs/configuration-options/
#
# NOTE: The ADMIN UI is intentionally English for ease of operation.
# The CONTENT operators type into these fields stays French, because it is
# rendered verbatim on the French public site.

backend:
  name: github
  branch: main
  repo: sabrinabean/service-chine
  base_url: https://decap-proxy.sabrinabin-fr.workers.dev/
  auth_endpoint: /auth

# Media paths — uploaded images stored under src/assets/<collection>/
media_folder: "src/assets"

# Locale — English admin UI (site content remains French)
locale: "en"

# Site URL for previews
site_url: https://service-chine.sabrinabin-fr.workers.dev
display_url: https://service-chine.sabrinabin-fr.workers.dev

publish_mode: editorial_workflow

collections:
  # ── Categories ──
  - name: categories
    label: "Categories"
    label_singular: "Category"
    folder: "src/content/categories"
    create: true
    slug: "{{title}}"
    media_folder: ""
    public_folder: "../../assets/categories"
    fields:
      - { label: "Title", name: title, widget: string, pattern: ['^[a-zA-Z0-9_-]+$', "Letters, numbers, dashes and underscores only"] }
      - { label: "Description", name: description, widget: text, required: false }
      - { label: "Display order", name: order, widget: number, valueType: int, default: 0 }
      - { label: "Featured image", name: thumbnail, widget: image, required: false, media_folder: "", public_folder: "../../assets/categories" }
      - { label: "Content", name: body, widget: markdown, required: false }

  # ── Blog ──
  - name: blog
    label: "Articles"
    label_singular: "Article"
    folder: "src/content/blog"
    create: true
    slug: "{{pubDate}}-{{title}}"
    media_folder: ""
    public_folder: "../../assets/news"
    fields:
      - { label: "Title", name: title, widget: string }
      - { label: "Description", name: description, widget: text }
      - { label: "Publish date", name: pubDate, widget: datetime, format: "YYYY-MM-DD" }
      - { label: "Updated date", name: updatedDate, widget: datetime, required: false, format: "YYYY-MM-DD" }
      - { label: "Featured image", name: thumbnail, widget: image, required: false, media_folder: "", public_folder: "../../assets/news" }
      - label: "Category"
        name: category
        widget: relation
        collection: categories
        value_field: "{{slug}}"
        search_fields: [title]
        display_fields: [title]
      - label: "Author"
        name: author
        widget: object

  # ── Pages ──
  - name: "pages"              # 新增 Pages 集合
    label: "Pages"
    folder: "content/pages"    # 指定存放页面文件的文件夹
    create: true
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "URL Path", name: "path", widget: "string" }  # 页面路径，如 /about
      - { label: "Body", name: "body", widget: "markdown" }     # 正文，使用 markdown 或 html
      # 还可以加其他字段，如 SEO 标题、描述等
        fields:
          - { label: "Identifier", name: slug, widget: string }
          - { label: "Name", name: name, widget: string }
      - { label: "Content", name: body, widget: markdown }

