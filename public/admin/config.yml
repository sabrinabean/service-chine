# Decap CMS configuration for Service Chine
# Documentation: https://decapcms.org/docs/configuration-options/

backend:
  name: github
  branch: main
  repo: sabrinabean/service-chine
  base_url: https://decap-proxy.service-chine.pages.dev
  auth_endpoint: /auth

# Media paths — uploaded images stored under src/assets/<collection>/
media_folder: "src/assets"

# Locale
locale: "fr"

# Site URL for previews
site_url: https://service-chine.pages.dev
display_url: https://service-chine.pages.dev

publish_mode: editorial_workflow

collections:
  # ── Catégories ──
  - name: categories
    label: "Catégories"
    label_singular: "Catégorie"
    folder: "src/content/categories"
    create: true
    slug: "{{title}}"
    media_folder: ""
    public_folder: "../../assets/categories"
    fields:
      - { label: "Titre", name: title, widget: string, pattern: ['^[a-zA-Z0-9_-]+$', "Lettres, chiffres, tirets et underscores uniquement"] }
      - { label: "Description", name: description, widget: text, required: false }
      - { label: "Ordre d'affichage", name: order, widget: number, valueType: int, default: 0 }
      - { label: "Image à la une", name: thumbnail, widget: image, required: false, media_folder: "", public_folder: "../../assets/categories" }
      - { label: "Contenu", name: body, widget: markdown, required: false }

  # ── Blog ──
  - name: blog
    label: "Articles"
    label_singular: "Article"
    folder: "src/content/blog"
    create: true
    slug: "{{title}}"
    media_folder: ""
    public_folder: "../../assets/news"
    fields:
      - { label: "Titre", name: title, widget: string }
      - { label: "Description", name: description, widget: text }
      - { label: "Date de publication", name: pubDate, widget: datetime, format: "MMM DD YYYY" }
      - { label: "Date de mise à jour", name: updatedDate, widget: datetime, required: false, format: "MMM DD YYYY" }
      - { label: "Image à la une", name: thumbnail, widget: image, required: false, media_folder: "", public_folder: "../../assets/news" }
      - label: "Catégorie"
        name: category
        widget: relation
        collection: categories
        value_field: title
        search_fields: [title]
        display_fields: [title]
      - label: "Auteur"
        name: author
        widget: object
        fields:
          - { label: "Identifiant", name: slug, widget: string }
          - { label: "Nom", name: name, widget: string }
      - { label: "Contenu", name: body, widget: markdown }

  # ── Services ──
  - name: service
    label: "Services"
    label_singular: "Service"
    folder: "src/content/service"
    create: true
    slug: "{{title}}"
    media_folder: ""
    public_folder: "../../assets/services"
    fields:
      - { label: "Titre", name: title, widget: string }
      - { label: "Description", name: description, widget: text }
      - { label: "Date de publication", name: pubDate, widget: datetime, required: false, format: "MMM DD YYYY" }
      - { label: "Date de mise à jour", name: updatedDate, widget: datetime, required: false, format: "MMM DD YYYY" }
      - { label: "Image à la une", name: thumbnail, widget: image, required: false, media_folder: "", public_folder: "../../assets/services" }
      - { label: "Mis en avant", name: featured, widget: boolean, default: false }
      - { label: "Contenu", name: body, widget: markdown }

  # ── Équipe ──
  - name: team
    label: "Équipe"
    label_singular: "Membre"
    folder: "src/content/team"
    create: true
    slug: "{{title}}"
    media_folder: ""
    public_folder: "../../assets/team"
    fields:
      - { label: "Nom", name: title, widget: string }
      - { label: "Description", name: description, widget: text }
      - { label: "Date de publication", name: pubDate, widget: datetime, required: false, format: "MMM DD YYYY" }
      - { label: "Date de mise à jour", name: updatedDate, widget: datetime, required: false, format: "MMM DD YYYY" }
      - { label: "Photo", name: thumbnail, widget: image, required: false, media_folder: "", public_folder: "../../assets/team" }
      - { label: "Mis en avant", name: featured, widget: boolean, default: false }
      - { label: "Note", name: rating, widget: number, valueType: int, default: 5, min: 1, max: 5 }
      - { label: "Contenu", name: body, widget: markdown }
